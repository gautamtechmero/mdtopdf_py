<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Workspace</title>
    <!-- Marked.js for fast Markdown parsing in browser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-editor: #1e1e2e;
            --bg-editor-header: #181825;
            --text-editor: #cdd6f4;
            --border-color: #313244;
            --accent-color: #89b4fa;
            --accent-hover: #b4befe;
            --toolbar-btn-color: #a6adc8;
            --scrollbar-thumb: #45475a;
            --scrollbar-track: #181825;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .workspace-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            background-color: #0b0f19;
        }

        /* Editor Section (Left Pane) */
        .editor-pane {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background-color: var(--bg-editor);
            box-sizing: border-box;
        }

        .editor-header {
            height: 48px;
            background-color: var(--bg-editor-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .editor-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar-btn {
            background: transparent;
            border: none;
            color: var(--toolbar-btn-color);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover {
            background-color: #313244;
            color: #ffffff;
        }

        .toolbar-divider {
            width: 1px;
            height: 18px;
            background-color: var(--border-color);
            margin: 0 4px;
        }

        .editor-textarea-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-editor);
        }

        .line-numbers {
            width: 45px;
            text-align: right;
            padding: 16px 8px 16px 0;
            font-family: "Fira Code", Consolas, Monaco, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #585b70;
            background-color: var(--bg-editor-header);
            user-select: none;
            box-sizing: border-box;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
        }

        textarea.editor-input {
            flex: 1;
            border: none;
            resize: none;
            outline: none;
            background-color: var(--bg-editor);
            color: var(--text-editor);
            font-family: "Fira Code", Consolas, Monaco, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 16px;
            box-sizing: border-box;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        textarea.editor-input::-webkit-scrollbar {
            width: 8px;
        }
        textarea.editor-input::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        textarea.editor-input::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        /* Preview Section (Right Pane) */
        .preview-pane {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
            box-sizing: border-box;
        }

        .preview-header {
            height: 48px;
            background-color: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .preview-title {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preview-workspace {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            box-sizing: border-box;
            background-color: #0f172a;
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }

        .preview-workspace::-webkit-scrollbar {
            width: 8px;
        }
        .preview-workspace::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .preview-workspace::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        /* Simulated Paper Sheet Container */
        .paper-sheet {
            background-color: #ffffff;
            color: #24292f;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform-origin: top center;
        }

        /* Dynamic Aspect Ratios mimicking real paper sizing */
        .paper-sheet.A4.portrait { width: 100%; max-width: 720px; min-height: 1018px; }
        .paper-sheet.A4.landscape { width: 100%; max-width: 950px; min-height: 671px; }

        .paper-sheet.Letter.portrait { width: 100%; max-width: 720px; min-height: 932px; }
        .paper-sheet.Letter.landscape { width: 100%; max-width: 932px; min-height: 720px; }

        .paper-sheet.Legal.portrait { width: 100%; max-width: 720px; min-height: 1186px; }
        .paper-sheet.Legal.landscape { width: 100%; max-width: 1186px; min-height: 720px; }

        .paper-sheet.A3.portrait { width: 100%; max-width: 850px; min-height: 1202px; }
        .paper-sheet.A3.landscape { width: 100%; max-width: 1202px; min-height: 850px; }

        .paper-sheet.A5.portrait { width: 100%; max-width: 500px; min-height: 707px; }
        .paper-sheet.A5.landscape { width: 100%; max-width: 707px; min-height: 500px; }

        /* Render styles inside paper sheet */
        .paper-content {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            font-size: 14px;
        }

        .paper-content table {
            width: 100% !important;
            max-width: 100% !important;
            table-layout: auto !important;
            border-collapse: collapse !important;
            margin-top: 10px !important;
            margin-bottom: 20px !important;
        }

        .paper-content table th, 
        .paper-content table td {
            padding: 8px 12px !important;
            border: 1px solid #d0d7de;
            word-break: normal !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            min-width: 80px !important;
            text-align: left;
        }

        .paper-content h1:first-child, 
        .paper-content h2:first-child, 
        .paper-content p:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }

        /* Theme Styling placeholder containers */
        #dynamic-theme-css {
            display: none;
        }

        /* Empty state placeholder styling */
        .empty-placeholder {
            color: #64748b;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            font-size: 14px;
        }

        /* Custom visual Page Break element in preview */
        .page-break {
            border-top: 2px dashed #3b82f6 !important;
            margin: 2.5rem 0 !important;
            position: relative;
            height: 0;
            page-break-before: always;
            break-before: page;
        }
        .page-break::after {
            content: "✂️ PAGE BREAK";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #3b82f6;
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 0.08em;
        }
    </style>
    <!-- Style block to hold the current theme's CSS -->
    <style id="dynamic-theme-style"></style>
</head>
<body>
    <div class="workspace-container">
        <!-- Editor (Left) -->
        <div class="editor-pane">
            <div class="editor-header">
                <div class="editor-title">
                    ✍️ EDITOR
                </div>
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="insertFormat('**', '**')" title="Bold"><b>B</b></button>
                    <button class="toolbar-btn" onclick="insertFormat('*', '*')" title="Italic"><i>I</i></button>
                    <button class="toolbar-btn" onclick="insertFormat('`', '`')" title="Inline Code">Code</button>
                    <button class="toolbar-btn" onclick="insertFormat('```\\n', '\\n```')" title="Code Block">Block</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" onclick="insertFormat('# ', '')" title="H1">H1</button>
                    <button class="toolbar-btn" onclick="insertFormat('## ', '')" title="H2">H2</button>
                    <button class="toolbar-btn" onclick="insertFormat('### ', '')" title="H3">H3</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" onclick="insertFormat('- ', '')" title="Bullet List">List</button>
                    <button class="toolbar-btn" onclick="insertFormat('| Header 1 | Header 2 |\\n| -------- | -------- |\\n| Cell 1   | Cell 2   |\\n', '')" title="Table">Table</button>
                    <button class="toolbar-btn" style="color: #60a5fa;" onclick="insertFormat('<div class=\\&quot;page-break\\&quot;></div>\\n', '')" title="Page Break">Page Break</button>
                </div>
            </div>
            <div class="editor-textarea-wrapper">
                <div class="line-numbers" id="line-numbers">1</div>
                <textarea class="editor-input" id="editor-input" placeholder="Type or paste your Markdown here..." spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Preview (Right) -->
        <div class="preview-pane">
            <div class="preview-header">
                <div class="preview-title">
                    👁️ LIVE PREVIEW
                </div>
            </div>
            <div class="preview-workspace">
                <div id="paper-wrapper" style="width: 100%; display: flex; justify-content: center; align-items: flex-start; overflow: visible;">
                    <div id="paper-sheet" class="paper-sheet A4 portrait">
                        <div id="paper-content" class="paper-content">
                            <div class="empty-placeholder">Your rendered PDF preview will appear here...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load local Streamlit Component Library -->
    <script src="streamlit-component-lib.js"></script>
    <script>
        const editor = document.getElementById('editor-input');
        const lineNumbers = document.getElementById('line-numbers');
        const paperContent = document.getElementById('paper-content');
        const paperSheet = document.getElementById('paper-sheet');
        const themeStyle = document.getElementById('dynamic-theme-style');

        let lastSentValue = "";

        // Auto-scale preview container to fit workspace width
        function scalePreview() {
            const workspace = document.querySelector('.preview-workspace');
            const sheet = document.getElementById('paper-sheet');
            const wrapper = document.getElementById('paper-wrapper');
            if (!sheet || !workspace || !wrapper) return;

            // Reset scale temporarily for baseline measurements
            sheet.style.transform = 'none';
            sheet.style.margin = '0 auto';

            const workspaceWidth = workspace.clientWidth - 48; // padding (24px each side)
            const sheetWidth = sheet.offsetWidth;

            let scale = 1;
            if (workspaceWidth < sheetWidth && workspaceWidth > 0) {
                scale = workspaceWidth / sheetWidth;
            }

            sheet.style.transform = `scale(${scale})`;
            sheet.style.transformOrigin = 'top center';

            // Set wrapper height to the scaled height of the sheet to ensure correct scrolling bounds
            const scaledHeight = sheet.offsetHeight * scale;
            wrapper.style.height = `${scaledHeight}px`;
        }

        window.addEventListener('resize', scalePreview);

        // Helper to update line numbers side sidebar
        function updateLineNumbers() {
            const lines = editor.value.split('\n');
            const lineCount = lines.length || 1;
            let numbersHtml = '';
            for (let i = 1; i <= lineCount; i++) {
                numbersHtml += i + '<br>';
            }
            lineNumbers.innerHTML = numbersHtml;
        }

        // Setup custom Marked.js renderer to handle specific requirements
        const renderer = new marked.Renderer();
        
        // Ensure tables are responsive in preview
        renderer.table = function(header, body) {
            return `<table class="preview-table">\n<thead>\n${header}</thead>\n<tbody>\n${body}</tbody>\n</table>\n`;
        };

        marked.setOptions({
            renderer: renderer,
            gfm: true,
            breaks: true,
            headerIds: false
        });

        // Parse and render Markdown to preview pane
        function renderMarkdown() {
            const text = editor.value;
            if (!text.trim()) {
                paperContent.innerHTML = '<div class="empty-placeholder">Your rendered PDF preview will appear here...</div>';
                return;
            }
            try {
                // Parse markdown using marked.js
                paperContent.innerHTML = marked.parse(text);
            } catch (e) {
                paperContent.innerHTML = `<div style="color: red; padding: 20px;">Markdown Parsing Error: ${e.message}</div>`;
            }
        }

        // Toolbar formatting helper
        function insertFormat(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selectedText = text.substring(start, end);
            
            // Clean escaped newlines if any
            const cleanBefore = before.replace(/\\n/g, '\n');
            const cleanAfter = after.replace(/\\n/g, '\n');

            const replacement = cleanBefore + selectedText + cleanAfter;
            editor.value = text.substring(0, start) + replacement + text.substring(end);
            editor.focus();
            
            // Re-position selection cursor
            editor.selectionStart = start + cleanBefore.length;
            editor.selectionEnd = start + cleanBefore.length + selectedText.length;
            
            // Trigger update event
            handleInput();
        }

        // Debounce value posts back to Python
        let postDebounceTimeout;
        function sendValueToStreamlit() {
            const currentValue = editor.value;
            if (currentValue !== lastSentValue) {
                lastSentValue = currentValue;
                Streamlit.setComponentValue(currentValue);
            }
        }

        function handleInput() {
            renderMarkdown();
            updateLineNumbers();
            
            // Sync scrolling of line numbers
            lineNumbers.scrollTop = editor.scrollTop;

            // Update scaling on input
            scalePreview();

            // Debounce reporting back to python to avoid sluggish Streamlit reruns
            clearTimeout(postDebounceTimeout);
            postDebounceTimeout = setTimeout(sendValueToStreamlit, 400);
        }

        // Bind events
        editor.addEventListener('input', handleInput);
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });

        // Initialize component
        Streamlit.setComponentReady();
        
        // Listen for layout settings changes and initial text from Python
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, (event) => {
            const { args } = event.detail;
            if (!args) return;

            // 1. Check for incoming text updates (from file uploads, reset buttons, etc.)
            if (args.initial_value !== undefined && args.initial_value !== editor.value) {
                // If it's a completely fresh start or a clear event
                editor.value = args.initial_value;
                lastSentValue = args.initial_value;
                renderMarkdown();
                updateLineNumbers();
            }

            // 2. Set heights dynamically if provided
            if (args.height) {
                Streamlit.setFrameHeight(args.height);
            } else {
                Streamlit.setFrameHeight(760);
            }

            // 3. Update theme styling dynamically
            if (args.theme_css) {
                // Scope the theme CSS using CSS nesting so it only applies inside the paper sheet
                const scopedCss = `.paper-sheet {\n${args.theme_css.replace(/\\bbody\\b/g, '&')}\n}`;
                themeStyle.innerHTML = scopedCss;
            }

            // 4. Update page size classes, margins, and orientation
            const size = args.page_size || 'A4';
            const orientation = args.orientation || 'portrait';
            const margin = args.margins || 'normal';
            const fontSize = args.font_size || '14px';

            // Reset paper classes
            paperSheet.className = `paper-sheet ${size} ${orientation}`;
            
            // Set dynamic padding based on margins selection
            const marginPaddings = {
                'narrow': '0.6cm',
                'normal': '1.2cm',
                'wide': '2.0cm'
            };
            const paddingVal = marginPaddings[margin] || '1.2cm';
            paperSheet.style.padding = paddingVal;

            // Apply font size directly to paper sheet contents
            paperSheet.style.fontSize = fontSize;

            // Adjust layout aspect-ratio/min-height based on font sizes and margins if needed
            // Ensure table columns auto-adjust cleanly
            const tables = paperContent.querySelectorAll('table');
            tables.forEach(table => {
                table.style.width = "100%";
                table.style.maxWidth = "100%";
                table.style.tableLayout = "auto";
                table.style.borderCollapse = "collapse";
            });

            // Adjust preview scale after layout changes
            setTimeout(scalePreview, 50);
        });
    </script>
</body>
</html>
