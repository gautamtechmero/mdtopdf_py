<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Workspace</title>
    <!-- Marked.js for fast Markdown parsing in browser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-editor: #1e1e2e;
            --bg-editor-header: #181825;
            --text-editor: #cdd6f4;
            --border-color: #313244;
            --accent-color: #89b4fa;
            --accent-hover: #b4befe;
            --toolbar-btn-color: #a6adc8;
            --scrollbar-thumb: #45475a;
            --scrollbar-track: #181825;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .workspace-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            background-color: #0b0f19;
        }

        /* View Mode Layout Configurations */
        .workspace-container.mode-split .editor-pane { width: 50%; display: flex; }
        .workspace-container.mode-split .preview-pane { width: 50%; display: flex; border-left: 1px solid var(--border-color); }
        
        .workspace-container.mode-editor .editor-pane { width: 100%; display: flex; }
        .workspace-container.mode-editor .preview-pane { display: none; }
        
        .workspace-container.mode-preview .editor-pane { display: none; }
        .workspace-container.mode-preview .preview-pane { width: 100%; display: flex; }

        /* Editor Section (Left Pane) */
        .editor-pane {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-editor);
            box-sizing: border-box;
        }

        .editor-header {
            height: 48px;
            background-color: var(--bg-editor-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .editor-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar-btn {
            background: transparent;
            border: none;
            color: var(--toolbar-btn-color);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover {
            background-color: #313244;
            color: #ffffff;
        }

        .toolbar-divider {
            width: 1px;
            height: 18px;
            background-color: var(--border-color);
            margin: 0 4px;
        }

        /* View Mode Selectors */
        .view-mode-selector {
            display: flex;
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2px;
        }

        .view-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .view-btn:hover {
            color: #ffffff;
            background-color: #1e1e2e;
        }

        .view-btn.active {
            color: #ffffff;
            background-color: #3b82f6;
        }

        .editor-textarea-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-editor);
        }

        .line-numbers {
            width: 45px;
            text-align: right;
            padding: 16px 8px 16px 0;
            font-family: "Fira Code", Consolas, Monaco, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #585b70;
            background-color: var(--bg-editor-header);
            user-select: none;
            box-sizing: border-box;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
        }

        textarea.editor-input {
            flex: 1;
            border: none;
            resize: none;
            outline: none;
            background-color: var(--bg-editor);
            color: var(--text-editor);
            font-family: "Fira Code", Consolas, Monaco, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 16px;
            box-sizing: border-box;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        textarea.editor-input::-webkit-scrollbar {
            width: 8px;
        }
        textarea.editor-input::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        textarea.editor-input::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        /* Preview Section (Right Pane) */
        .preview-pane {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
            box-sizing: border-box;
        }

        .preview-header {
            height: 48px;
            background-color: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .preview-title {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preview-workspace {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #24292f;
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
            transition: background-color 0.2s, color 0.2s;
        }

        .preview-workspace::-webkit-scrollbar {
            width: 8px;
        }
        .preview-workspace::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .preview-workspace::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        /* Fluid Preview Content Wrapper (Centered for readability) */
        .paper-content {
            box-sizing: border-box;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }

        .paper-content table {
            width: 100% !important;
            max-width: 100% !important;
            table-layout: auto !important;
            border-collapse: collapse !important;
            margin-top: 10px !important;
            margin-bottom: 20px !important;
        }

        .paper-content table th, 
        .paper-content table td {
            padding: 8px 12px !important;
            border: 1px solid #d0d7de;
            word-break: normal !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            min-width: 80px !important;
            text-align: left;
        }

        .paper-content h1:first-child, 
        .paper-content h2:first-child, 
        .paper-content p:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }

        /* Empty state placeholder styling */
        .empty-placeholder {
            color: #64748b;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            font-size: 14px;
        }

        /* Custom visual Page Break element in preview */
        .page-break {
            border-top: 2px dashed #3b82f6 !important;
            margin: 2.5rem 0 !important;
            position: relative;
            height: 0;
            page-break-before: always;
            break-before: page;
        }
        .page-break::after {
            content: "✂️ PAGE BREAK";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #3b82f6;
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 0.08em;
        }
    </style>
    <!-- Style block to hold the current theme's CSS -->
    <style id="dynamic-theme-style"></style>
</head>
<body>
    <div id="workspace-container" class="workspace-container mode-split">
        <!-- Editor (Left) -->
        <div class="editor-pane">
            <div class="editor-header">
                <div class="editor-title">
                    ✍️ EDITOR
                </div>
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="insertFormat('**', '**')" title="Bold"><b>B</b></button>
                    <button class="toolbar-btn" onclick="insertFormat('*', '*')" title="Italic"><i>I</i></button>
                    <button class="toolbar-btn" onclick="insertFormat('`', '`')" title="Inline Code">Code</button>
                    <button class="toolbar-btn" onclick="insertFormat('```\\n', '\\n```')" title="Code Block">Block</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" onclick="insertFormat('# ', '')" title="H1">H1</button>
                    <button class="toolbar-btn" onclick="insertFormat('## ', '')" title="H2">H2</button>
                    <button class="toolbar-btn" onclick="insertFormat('### ', '')" title="H3">H3</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" onclick="insertFormat('- ', '')" title="Bullet List">List</button>
                    <button class="toolbar-btn" onclick="insertFormat('| Header 1 | Header 2 |\\n| -------- | -------- |\\n| Cell 1   | Cell 2   |\\n', '')" title="Table">Table</button>
                    <button class="toolbar-btn" style="color: #60a5fa;" onclick="insertFormat('<div class=\\&quot;page-break\\&quot;></div>\\n', '')" title="Page Break">Page Break</button>
                </div>
                <!-- Mode selector (Editor header) -->
                <div class="view-mode-selector">
                    <button class="view-btn active btn-split" onclick="setViewMode('split')" title="Split View">↔️ Split</button>
                    <button class="view-btn btn-editor" onclick="setViewMode('editor')" title="Focus Editor">📝 Focus</button>
                    <button class="view-btn btn-preview" onclick="setViewMode('preview')" title="Focus Preview">👁️ Preview</button>
                </div>
            </div>
            <div class="editor-textarea-wrapper">
                <div class="line-numbers" id="line-numbers">1</div>
                <textarea class="editor-input" id="editor-input" placeholder="Type or paste your Markdown here..." spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Preview (Right) -->
        <div class="preview-pane">
            <div class="preview-header">
                <div class="preview-title">
                    👁️ LIVE PREVIEW
                </div>
                <!-- Mode selector (Preview header) -->
                <div class="view-mode-selector">
                    <button class="view-btn active btn-split" onclick="setViewMode('split')" title="Split View">↔️ Split</button>
                    <button class="view-btn btn-editor" onclick="setViewMode('editor')" title="Focus Editor">📝 Edit</button>
                    <button class="view-btn btn-preview" onclick="setViewMode('preview')" title="Focus Preview">👁️ Focus</button>
                </div>
            </div>
            <div class="preview-workspace" id="preview-workspace">
                <div id="paper-content" class="paper-content">
                    <div class="empty-placeholder">Your rendered PDF preview will appear here...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load local Streamlit Component Library -->
    <script src="streamlit-component-lib.js"></script>
    <script>
        const editor = document.getElementById('editor-input');
        const lineNumbers = document.getElementById('line-numbers');
        const paperContent = document.getElementById('paper-content');
        const previewWorkspace = document.getElementById('preview-workspace');
        const themeStyle = document.getElementById('dynamic-theme-style');
        let lastSentValue = "";
        let currentValueId = 0;

        // Handle view mode changes (collapse and expand)
        function setViewMode(mode) {
            const container = document.getElementById('workspace-container');
            container.className = `workspace-container mode-${mode}`;

            // Sync all view mode buttons
            document.querySelectorAll('.view-mode-selector').forEach(selector => {
                selector.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
                if (mode === 'split') {
                    selector.querySelector('.btn-split').classList.add('active');
                } else if (mode === 'editor') {
                    selector.querySelector('.btn-editor').classList.add('active');
                } else if (mode === 'preview') {
                    selector.querySelector('.btn-preview').classList.add('active');
                }
            });
        }

        // Helper to update line numbers side sidebar
        function updateLineNumbers() {
            const lines = editor.value.split('\n');
            const lineCount = lines.length || 1;
            let numbersHtml = '';
            for (let i = 1; i <= lineCount; i++) {
                numbersHtml += i + '<br>';
            }
            lineNumbers.innerHTML = numbersHtml;
        }

        // Use default Marked.js renderer which parses GFM tables correctly
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: false
        });

        function preprocessMarkdownTables(mdText) {
            if (!mdText) return "";
            const lines = mdText.split('\n');
            const processedLines = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const stripped = line.trim();
                
                if (stripped === "" && i > 0 && i < lines.length - 1) {
                    const prevStripped = lines[i-1].trim();
                    const nextStripped = lines[i+1].trim();
                    const prevIsRow = prevStripped.startsWith('|') && prevStripped.endsWith('|') && prevStripped.length > 1;
                    const nextIsRow = nextStripped.startsWith('|') && nextStripped.endsWith('|') && nextStripped.length > 1;
                    if (prevIsRow && nextIsRow) {
                        continue;
                    }
                }
                processedLines.push(line);
            }
            
            const finalLines = [];
            let inTable = false;
            let tableHasSeparator = false;
            let firstRowIndex = -1;
            let colsCount = 0;
            
            for (let i = 0; i < processedLines.length; i++) {
                const line = processedLines[i];
                const stripped = line.trim();
                const isTableRow = stripped.startsWith('|') && stripped.endsWith('|') && stripped.length > 1;
                
                if (isTableRow) {
                    const isSeparator = stripped.split('|').slice(1, -1).every(cell => {
                        const cellStr = cell.trim();
                        return cellStr.replace(/[- :*]/g, '') === '';
                    }) && stripped.includes('-');
                    
                    if (!inTable) {
                        inTable = true;
                        tableHasSeparator = isSeparator;
                        colsCount = (stripped.match(/\|/g) || []).length - 1;
                        firstRowIndex = finalLines.length;
                        finalLines.push(line);
                    } else {
                        if (isSeparator) {
                            tableHasSeparator = true;
                        }
                        finalLines.push(line);
                    }
                } else {
                    if (inTable && !tableHasSeparator && colsCount > 0) {
                        const sepLine = "|" + " --- |".repeat(colsCount);
                        finalLines.splice(firstRowIndex + 1, 0, sepLine);
                    }
                    inTable = false;
                    tableHasSeparator = false;
                    colsCount = 0;
                    finalLines.push(line);
                }
            }
            
            if (inTable && !tableHasSeparator && colsCount > 0) {
                const sepLine = "|" + " --- |".repeat(colsCount);
                finalLines.splice(firstRowIndex + 1, 0, sepLine);
            }
            
            return finalLines.join('\n');
        }

        // Parse and render Markdown to preview pane
        function renderMarkdown() {
            const text = editor.value;
            if (!text.trim()) {
                paperContent.innerHTML = '<div class="empty-placeholder">Your rendered PDF preview will appear here...</div>';
                return;
            }
            try {
                const preprocessedText = preprocessMarkdownTables(text);
                // Parse markdown using marked.js
                paperContent.innerHTML = marked.parse(preprocessedText);
            } catch (e) {
                paperContent.innerHTML = `<div style="color: red; padding: 20px;">Markdown Parsing Error: ${e.message}</div>`;
            }
        }

        // Toolbar formatting helper
        function insertFormat(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selectedText = text.substring(start, end);
            
            // Clean escaped newlines if any
            const cleanBefore = before.replace(/\\n/g, '\n');
            const cleanAfter = after.replace(/\\n/g, '\n');

            const replacement = cleanBefore + selectedText + cleanAfter;
            editor.value = text.substring(0, start) + replacement + text.substring(end);
            editor.focus();
            
            // Re-position selection cursor
            editor.selectionStart = start + cleanBefore.length;
            editor.selectionEnd = start + cleanBefore.length + selectedText.length;
            
            // Trigger update event
            handleInput();
        }

        // Debounce value posts back to Python
        let postDebounceTimeout;
        function sendValueToStreamlit() {
            const currentValue = editor.value;
            if (currentValue !== lastSentValue) {
                lastSentValue = currentValue;
                Streamlit.setComponentValue({
                    value: currentValue,
                    value_id: currentValueId
                });
            }
        }

        function handleInput() {
            renderMarkdown();
            updateLineNumbers();
            
            // Sync scrolling of line numbers
            lineNumbers.scrollTop = editor.scrollTop;

            // Debounce reporting back to python to avoid sluggish Streamlit reruns
            clearTimeout(postDebounceTimeout);
            postDebounceTimeout = setTimeout(sendValueToStreamlit, 400);
        }

        // Bind events
        editor.addEventListener('input', handleInput);
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });

        // Initialize component
        Streamlit.setComponentReady();
        
        // Listen for layout settings changes and initial text from Python
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, (event) => {
            const { args } = event.detail;
            console.log("DEBUG JS: Received RENDER EVENT. args =", JSON.stringify(args), "currentValueId =", currentValueId);
            if (!args) return;

            // 1. Check for incoming text updates (from file uploads, reset buttons, etc.)
            if (args.value_id !== undefined && args.value_id !== currentValueId) {
                currentValueId = args.value_id;
                editor.value = args.initial_value || "";
                lastSentValue = editor.value;
                renderMarkdown();
                updateLineNumbers();
                // Send the value back immediately to align Streamlit state
                Streamlit.setComponentValue({
                    value: editor.value,
                    value_id: currentValueId
                });
            } else if (args.initial_value !== undefined && editor.value === "") {
                editor.value = args.initial_value;
                lastSentValue = editor.value;
                renderMarkdown();
                updateLineNumbers();
            }

            // 2. Set heights dynamically if provided
            if (args.height) {
                Streamlit.setFrameHeight(args.height);
            } else {
                Streamlit.setFrameHeight(760);
            }

            // 3. Update theme styling dynamically
            if (args.theme_css) {
                // Scope the theme CSS using CSS nesting so it only applies inside the preview workspace
                const scopedCss = `.preview-workspace {\n${args.theme_css.replace(/\bbody\b/g, '&')}\n}`;
                themeStyle.innerHTML = scopedCss;
            }

            // 4. Update margins and font sizing
            const margin = args.margins || 'normal';
            const fontSize = args.font_size || '14px';
            
            // Set dynamic padding based on margins selection for the workspace
            const marginPaddings = {
                'narrow': '16px',
                'normal': '32px',
                'wide': '48px'
            };
            const paddingVal = marginPaddings[margin] || '32px';
            previewWorkspace.style.padding = paddingVal;

            // Apply font size directly to preview contents
            previewWorkspace.style.fontSize = fontSize;

            // Ensure table columns auto-adjust cleanly
            const tables = paperContent.querySelectorAll('table');
            tables.forEach(table => {
                table.style.width = "100%";
                table.style.maxWidth = "100%";
                table.style.tableLayout = "auto";
                table.style.borderCollapse = "collapse";
            });
        });
    </script>
</body>
</html>
